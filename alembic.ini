# ============================================================================
# ALEMBIC CONFIGURATION FILE
# AutoM8rs K8 Platform
# ============================================================================
#
# This file tells Alembic how to connect to the database and manage migrations.
# Database URL is pulled from your app.config settings at runtime (not hardcoded here).
# ============================================================================

[alembic]
# path to migration scripts (relative to project root)
script_location = alembic

# template used to generate migration files
# %%(rev)s = revision ID, %%(slug)s = short description
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file to be detected as revisions
sourceless = false

# version number format
version_num_format = %04d

# version path separator
version_path_separator = os

# set to 'true' to search source files recursively
recursive_version_locations = false

# the output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# Note: sqlalchemy.url is intentionally NOT set here.
# It's set dynamically in env.py from your app.config.settings.DATABASE_URL
# This means you only need to manage DATABASE_URL in one place (your .env file).


# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S


